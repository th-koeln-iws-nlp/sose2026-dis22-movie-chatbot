[project]
name = "dis22-sose2026-movie-chatbot"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "chromadb>=1.5.7",
    # FlagEmbedding from fork until transformers 5.x fix is merged upstream
    # See: https://github.com/FlagOpen/FlagEmbedding/issues/1561
